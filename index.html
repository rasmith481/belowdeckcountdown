<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Below Deck Countdown</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #ffffff;
      --cream:   #f8f5ef;
      --sand:    #e8ddc8;
      --navy:    #0d2040;
      --navy-mid:#1a3a6b;
      --red:     #c8293a;
      --sky:     #c9e4f0;
      --water:   #4a9fc4;
      --water-d: #2d7aa8;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      color: var(--navy);
      overflow-x: hidden;
      background: var(--sky);
      position: relative;
    }

    /* ── Sky gradient ── */
    .sky-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        180deg,
        #daf0fb 0%,
        #b8dff5 30%,
        #8ecce8 55%,
        #5eb5d8 75%,
        #3a9ec5 100%
      );
    }

    /* ── Sun ── */
    .sun {
      position: fixed;
      top: 6vh;
      right: 12vw;
      width: clamp(60px, 10vw, 110px);
      height: clamp(60px, 10vw, 110px);
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #fff9c4, #ffe066 40%, #ffc926);
      box-shadow:
        0 0 0 clamp(8px,1.5vw,18px) rgba(255,220,80,0.25),
        0 0 0 clamp(16px,3vw,36px) rgba(255,220,80,0.12),
        0 0 0 clamp(24px,5vw,55px) rgba(255,220,80,0.06);
      z-index: 1;
      animation: sunPulse 6s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.88; }
    }

    /* ── Seagulls ── */
    .gulls {
      position: fixed;
      top: 12vh;
      left: 8vw;
      z-index: 2;
      pointer-events: none;
    }
    .gull {
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      display: inline-block;
      animation: soar var(--dur, 8s) ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
      opacity: 0.75;
    }
    @keyframes soar {
      0%   { transform: translate(0,0) rotate(-3deg); }
      100% { transform: translate(clamp(20px,4vw,50px), -12px) rotate(3deg); }
    }

    /* ── Ocean ── */
    .ocean {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: clamp(140px, 25vh, 260px);
      z-index: 3;
      overflow: hidden;
    }
    .wave { position: absolute; bottom: 0; left: 0; width: 200%; }
    .wave svg { width: 100%; height: 100%; display: block; }
    .wave1 { animation: waveMove 9s  linear infinite;         opacity: 1; }
    .wave2 { animation: waveMove 14s linear infinite reverse; opacity: 0.8; bottom: -8px; }
    .wave3 { animation: waveMove 18s linear infinite;         opacity: 0.6; bottom: -16px; }
    @keyframes waveMove {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── Boat ── */
    .boat-wrap {
      position: fixed;
      bottom: clamp(100px, 18vh, 200px);
      left: -140px;
      z-index: 4;
      animation: sail 35s linear infinite;
    }
    @keyframes sail {
      0%   { left: -140px; }
      100% { left: calc(100% + 30px); }
    }
    .boat-icon {
      font-size: clamp(2.5rem, 5vw, 4rem);
      filter: drop-shadow(2px 4px 8px rgba(0,0,30,0.2));
    }

    /* ── Main card ── */
    .container {
      position: relative;
      z-index: 10;
      max-width: 820px;
      width: calc(100% - 2rem);
      margin: clamp(2rem, 5vh, 4rem) auto clamp(180px, 28vh, 280px);
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.95);
      box-shadow:
        0 4px 40px rgba(13,32,64,0.12),
        0 1px 0 rgba(255,255,255,0.8) inset;
      padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 5vw, 3rem);
      text-align: center;
    }

    /* ── Stripe bar ── */
    .stripe-bar {
      height: 10px;
      border-radius: 8px 8px 0 0;
      background: repeating-linear-gradient(
        90deg,
        var(--navy) 0px, var(--navy) 18px,
        var(--white) 18px, var(--white) 36px,
        var(--red)   36px, var(--red)   54px,
        var(--white) 54px, var(--white) 72px
      );
      margin: -clamp(2rem,5vw,3.5rem) -clamp(1.5rem,5vw,3rem) clamp(1.5rem,4vw,2.5rem);
      border-radius: 18px 18px 0 0;
    }

    /* ── Life ring ── */
    .ring-wrap {
      margin-bottom: 0.8rem;
    }
    .ring {
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      display: inline-block;
      animation: bob 4s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }
    @keyframes bob {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-8px) rotate(4deg); }
    }

    /* ── Typography ── */
    .eyebrow {
      font-size: clamp(0.6rem, 1.5vw, 0.72rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--water-d);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 8vw, 5.2rem);
      font-weight: 300;
      line-height: 1;
      color: var(--navy);
      letter-spacing: -0.01em;
      margin-bottom: 0.2rem;
    }
    h1 em {
      font-style: italic;
      color: var(--red);
    }

    .subtitle {
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      letter-spacing: 0.12em;
      color: rgba(13,32,64,0.55);
      margin-bottom: 1.8rem;
      font-weight: 300;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 0 auto 1.8rem;
      max-width: 420px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--sand), transparent);
    }
    .divider-star { color: var(--navy); font-size: 0.7rem; opacity: 0.5; }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      gap: clamp(0.6rem, 2.5vw, 1.6rem);
      justify-content: center;
      flex-wrap: wrap;
      margin: 0 auto 1.8rem;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .digit-box {
      background: var(--navy);
      border-radius: 12px;
      padding: clamp(0.8rem, 2.5vw, 1.4rem) clamp(0.9rem, 3vw, 1.8rem);
      min-width: clamp(76px, 14vw, 120px);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 6px 24px rgba(13,32,64,0.25),
        0 1px 0 rgba(255,255,255,0.08) inset;
    }
    .digit-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    .digit-box::after {
      content: '';
      position: absolute;
      left: 8%;
      right: 8%;
      top: 50%;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .digit {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 8vw, 5.2rem);
      font-weight: 600;
      line-height: 1;
      color: var(--white);
      display: block;
      min-width: 2ch;
      text-align: center;
      position: relative;
    }

    .label {
      font-size: clamp(0.55rem, 1.3vw, 0.68rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--navy-mid);
      font-weight: 600;
    }

    .sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      color: var(--navy);
      align-self: center;
      margin-top: -1.4rem;
      opacity: 0.25;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0.25; }
      50%      { opacity: 0.05; }
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-style: italic;
      color: rgba(13,32,64,0.6);
      margin-bottom: 0.4rem;
      font-weight: 300;
    }
    .tagline strong {
      color: var(--red);
      font-style: normal;
      font-weight: 600;
    }

    .location-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: clamp(0.6rem, 1.4vw, 0.72rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(13,32,64,0.4);
      font-weight: 500;
      margin-top: 0.5rem;
    }

    /* ── Expired ── */
    #expired {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--navy);
      font-style: italic;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.6; }
    }

    /* ── YouTube ── */
    .video-wrap {
      margin: 2rem auto 0;
      max-width: 720px;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid var(--navy);
      box-shadow: 0 8px 32px rgba(13,32,64,0.2);
      aspect-ratio: 16 / 9;
    }
    .video-wrap iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .sep { display: none; }
      .countdown { gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="sky-bg"></div>

  <!-- Sun -->
  <div class="sun"></div>

  <!-- Seagulls -->
  <div class="gulls">
    <span class="gull" style="--dur:7s;  --delay:0s">🕊</span>
    <span class="gull" style="--dur:9s;  --delay:1.2s; margin-left:2rem; font-size:0.85em">🕊</span>
    <span class="gull" style="--dur:11s; --delay:0.5s; margin-left:3.5rem; font-size:0.7em">🕊</span>
  </div>

  <!-- Sailing boat -->
  <div class="boat-wrap">
    <span class="boat-icon">⛵</span>
  </div>

  <!-- Main card -->
  <div class="container">
    <div class="stripe-bar"></div>

    <div class="ring-wrap">
      <span class="ring">🛟</span>
    </div>

    <p class="eyebrow">You're Invited Aboard</p>

    <h1>Below Deck<br><em>Soirée</em></h1>

    <p class="subtitle">Ibiza &nbsp;·&nbsp; Mediterranean Charter &nbsp;·&nbsp; Summer 2026</p>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-star">✦</span>
      <div class="divider-line"></div>
    </div>

    <div class="countdown" id="countdown">
      <div class="unit">
        <div class="digit-box"><span class="digit" id="hours">00</span></div>
        <span class="label">Hours</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="digit-box"><span class="digit" id="minutes">00</span></div>
        <span class="label">Minutes</span>
      </div>
      <span class="sep">:</span>
      <div class="unit">
        <div class="digit-box"><span class="digit" id="seconds">00</span></div>
        <span class="label">Seconds</span>
      </div>
    </div>

    <p id="expired">Welcome aboard, darling 🥂</p>

    <p class="tagline">
      All guests to the main deck at <strong>9 PM Eastern</strong>
    </p>
    <p class="location-tag">⚓ &nbsp; Dress smart &nbsp;·&nbsp; Bring good energy</p>

    <div class="divider" style="margin-top:1.8rem; margin-bottom:0">
      <div class="divider-line"></div>
      <span class="divider-star">✦</span>
      <div class="divider-line"></div>
    </div>

    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/_9e-h1Lgc2c"
        title="Below Deck"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- Ocean waves -->
  <div class="ocean">
    <div class="wave wave1">
      <svg viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#3a9ec5" fill-opacity="0.9"
          d="M0,60 C180,110 360,20 540,70 C720,120 900,25 1080,70 C1260,115 1380,45 1440,65 L1440,160 L0,160 Z"/>
      </svg>
    </div>
    <div class="wave wave2">
      <svg viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#2d7aa8"
          d="M0,80 C200,30 400,130 600,80 C800,30 1000,130 1200,80 C1320,55 1400,95 1440,80 L1440,160 L0,160 Z"/>
      </svg>
    </div>
    <div class="wave wave3">
      <svg viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#1a5f82"
          d="M0,100 C240,50 480,150 720,100 C960,50 1200,150 1440,100 L1440,160 L0,160 Z"/>
      </svg>
    </div>
  </div>

  <script>
    // Target: May 10 2026 at 21:00 EDT (UTC-4)
    const TARGET = new Date('2026-05-10T21:00:00-04:00').getTime();

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const diff = TARGET - Date.now();
      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        document.getElementById('expired').style.display  = 'block';
        return;
      }
      const s = Math.floor(diff / 1000);
      document.getElementById('hours').textContent   = pad(Math.floor(s / 3600));
      document.getElementById('minutes').textContent = pad(Math.floor(s / 60) % 60);
      document.getElementById('seconds').textContent = pad(s % 60);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
